name: Collector-Image bauen

# Baut das Collector-Docker-Image und veröffentlicht es in der GitHub
# Container Registry (ghcr.io). Das NAS lädt dieses fertige Image nur noch
# herunter – es muss vor Ort nichts gebaut werden.

on:
  push:
    branches: [main]
    paths:
      - 'collector/**'
      - '.github/workflows/collector-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: An ghcr.io anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./collector
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pv-collector:latest
